name: DriftGuard PR Comment

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  driftguard-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install DriftGuard
        run: cargo install --path .

      - name: Run DriftGuard
        id: driftguard
        continue-on-error: true
        shell: bash
        run: |
          set +e
          driftguard check --since origin/${{ github.base_ref }} --env-scope changed --markdown > driftguard-report.md 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- driftguard-report -->';
            const report = fs.readFileSync('driftguard-report.md', 'utf8');
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail on DriftGuard violations
        if: steps.driftguard.outputs.exit_code != '0'
        run: exit 1
